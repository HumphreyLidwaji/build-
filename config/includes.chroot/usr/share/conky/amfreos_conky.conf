-- AmfreOS Conky with Nginx & MariaDB status

conky.config = {
  background = true,
  update_interval = 2,

  cpu_avg_samples = 2,
  net_avg_samples = 2,
  no_buffers = true,
  double_buffer = true,
  text_buffer_size = 2048,

  alignment = "top_right",
  gap_x = 16,
  gap_y = 64,

  minimum_width = 300,
  maximum_width = 300,

  own_window = true,
  own_window_type = "dock",
  own_window_argb_visual = true,
  own_window_argb_value = 0,
  own_window_hints = "undecorated,below,sticky,skip_taskbar,skip_pager",
  own_window_title = "AmfreOS Conky",

  use_xft = true,
  font = "Monospace:size=8",

  default_color = "FFFFFF",

  color1 = "DDDDDD",
  color2 = "AAAAAA",
  color3 = "888888",
  color4 = "EF5A29",
  color5 = "EF5A29",
  color6 = "3a5153",
}

conky.text = [[

${font Monospace:bold:size=10}${color4}AMFREOS STATUS${color6}${hr 1}${color}
OS:${alignr}${execi 3600 grep PRETTY_NAME /etc/os-release | cut -d= -f2 | tr -d '"'}
Kernel:${alignr}$kernel
Host:${alignr}$nodename
User:${alignr}$user_names
Uptime:${alignr}$uptime
Time:${alignr}${time %Y-%m-%d %H:%M:%S}

${voffset 6}${font Monospace:bold:size=10}${color4}CPU${color6}${hr 1}${color}
Usage:${alignr}${cpu}%
${color4}${cpubar 6,280}${color}
Freq:${alignr}${freq_g} GHz
Tasks:${alignr}$processes ($running_processes running)

Top CPU:
${top name 1} ${alignr}${top cpu 1}%
${top name 2} ${alignr}${top cpu 2}%
${top name 3} ${alignr}${top cpu 3}%

${voffset 6}${font Monospace:bold:size=10}${color4}MEMORY${color6}${hr 1}${color}
RAM:${alignr}$mem / $memmax ($memperc%)
${color4}${membar 6,280}${color}
Swap:${alignr}$swap / $swapmax ($swapperc%)

Top MEM:
${top_mem name 1} ${alignr}${top_mem mem 1}%
${top_mem name 2} ${alignr}${top_mem mem 2}%
${top_mem name 3} ${alignr}${top_mem mem 3}%

${voffset 6}${font Monospace:bold:size=10}${color4}DISK${color6}${hr 1}${color}
Root:${alignr}${fs_used /} / ${fs_size /}
Usage:${alignr}${fs_used_perc /}%
${color4}${fs_bar 6,280 /}${color}

${voffset 6}${font Monospace:bold:size=10}${color4}NETWORK${color6}${hr 1}${color}
Interface:${alignr}${gw_iface}
IP:${alignr}${addr ${gw_iface}}
Gateway:${alignr}${gw_ip}

Down:${alignr}${downspeedf ${gw_iface}} KiB/s
Up:${alignr}${upspeedf ${gw_iface}} KiB/s

${color4}${downspeedgraph ${gw_iface} 12,280 EF5A29 EF5A29}${color}
${color6}${upspeedgraph ${gw_iface} 12,280 3a5153 3a5153}${color}

Connections:${alignr}${tcp_portmon 1 65535 count}

${voffset 6}${font Monospace:bold:size=10}${color4}SERVICES${color6}${hr 1}${color}

Nginx:${alignr}${if_match ${execi 10 systemctl is-active nginx} == "active"}${color4}RUNNING${color}${else}${color2}STOPPED${color}${endif}

MariaDB:${alignr}${if_match ${execi 10 systemctl is-active mariadb} == "active"}${color4}RUNNING${color}${else}${color2}STOPPED${color}${endif}

]]
